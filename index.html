<!DOCTYPE html>
<html>

<head>

<title>EcoCart Study</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>
Online Shopping Experience
</h1>


<p>
You will take part in a simulated online shopping experience.
Please imagine you are making a real purchase and choose the options you would normally prefer.
</p>


<p>
No payment is required. Your responses will be used for research purposes.
</p>


<label>

<input type="checkbox" id="consent">

I agree to participate in this study.

</label>


<br><br>


<button class="btn" onclick="startExperiment()">

Start Shopping

</button>


</div>



<script>


function startExperiment(){


let consent =
document.getElementById("consent").checked;


if(!consent){

alert("Please provide consent before continuing.");

return;

}



let checkoutPages=[


"checkout1.html",

"checkout2.html",

"checkout3.html",

"checkout4.html"


];



let randomCheckout =

checkoutPages[
Math.floor(Math.random()*checkoutPages.length)
];



window.location.href=randomCheckout;


}


</script>


</body>

</html>
